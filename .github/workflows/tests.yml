name: Automation (API + Web + Mobile)

on: [push]

jobs:

  # ================= API TESTING =================
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run API Tests
        run: pytest tests/api --alluredir=allure-results-api


  # ================= WEB TESTING =================
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run Web Tests
        run: pytest tests/web --alluredir=allure-results-web


  # ================= MOBILE TESTING =================
  mobile-tests:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: ${{ runner.temp }}/android-sdk
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      ANDROID_AVD_HOME: ${{ runner.temp }}/.android/avd

    steps:
      - uses: actions/checkout@v4

      # Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Node (Appium requirement)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install Android SDK
      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d temp

          mkdir -p latest
          mv temp/cmdline-tools/* latest/
          rm -rf temp

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "emulator" "platforms;android-30" "system-images;android-30;google_apis;x86_64"

      # Create Emulator
      - name: Create Emulator
        run: |
          mkdir -p $ANDROID_AVD_HOME

          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-30;google_apis;x86_64" \
            --device "pixel" \
            --force

          echo "Available AVDs:"
          avdmanager list avd

      # Start Emulator
      - name: Start Emulator
        run: |
          emulator -avd test -no-window -no-audio -no-boot-anim -accel off &

          adb wait-for-device

          boot_completed=""
          until [[ "$boot_completed" == "1" ]]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Waiting for emulator to boot..."
            sleep 5
          done

          adb devices

      # Install Appium
      - name: Install Appium
        run: npm install -g appium

      # Start Appium
      - name: Start Appium
        run: |
          appium > appium.log 2>&1 &

      # Install Python deps
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Run Mobile Tests
      - name: Run Mobile Tests
        run: pytest tests/mobile --alluredir=allure-results-mobile
