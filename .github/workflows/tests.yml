name: Automation (API + Web + Mobile)

on: [push]

jobs:

  # ================= API TESTING =================
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: pytest tests/api --alluredir=allure-results-api


  # ================= WEB TESTING =================
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps

      - run: pytest tests/web --alluredir=allure-results-web


  # ================= MOBILE TESTING =================
  mobile-tests:
    runs-on: ubuntu-latest   # ✅ FIXED INDENTATION

    steps:
      - uses: actions/checkout@v4

      # Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Node (Appium)
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install deps
      - run: pip install -r requirements.txt

      # ✅ Stable Emulator Setup
      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel

          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
            -accel off
            -no-snapshot
            -no-snapshot-save

          disable-animations: true
          script: |
            adb devices

            npm install -g appium
            appium > appium.log 2>&1 &

            pytest tests/mobile --alluredir=allure-results-mobile
