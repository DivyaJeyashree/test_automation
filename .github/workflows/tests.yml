name: Run Automation Tests (API + Web + Mobile)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # -----------------------------
    # 📥 Checkout Code
    # -----------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -----------------------------
    # 🐍 Setup Python
    # -----------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    # -----------------------------
    # ☕ Setup Java
    # -----------------------------
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # -----------------------------
    # 📱 Setup Android SDK
    # -----------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # -----------------------------
    # 📱 Add Emulator to PATH (IMPORTANT FIX)
    # -----------------------------
    - name: Set Android Path
      run: |
        echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

    # -----------------------------
    # 📱 Install Emulator + Image
    # -----------------------------
    - name: Install Emulator Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "emulator" "system-images;android-30;google_apis;x86_64"

    # -----------------------------
    # 📱 Create AVD
    # -----------------------------
    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
          -n test \
          -k "system-images;android-30;google_apis;x86_64" \
          --force

    # -----------------------------
    # 🔍 Debug AVD (IMPORTANT)
    # -----------------------------
    - name: List AVDs
      run: emulator -list-avds

    # -----------------------------
    # 📱 Start Emulator
    # -----------------------------
    - name: Start Emulator
      run: |
        nohup emulator -avd test -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect &
        adb wait-for-device
        adb shell input keyevent 82

    # -----------------------------
    # 📱 Install Appium
    # -----------------------------
    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    # -----------------------------
    # 📱 Start Appium Server
    # -----------------------------
    - name: Start Appium Server
      run: |
        appium &
        sleep 20

    # -----------------------------
    # 🧪 Run API Tests
    # -----------------------------
    - name: Run API Tests
      run: pytest tests/api --alluredir=allure-results

    # -----------------------------
    # 🌐 Run Web Tests
    # -----------------------------
    - name: Run Web Tests
      run: pytest tests/web --alluredir=allure-results

    # -----------------------------
    # 📱 Run Mobile Tests
    # -----------------------------
    - name: Run Mobile Tests
      run: pytest tests/mobile --alluredir=allure-results

    # -----------------------------
    # 📊 Upload Allure Report
    # -----------------------------
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
