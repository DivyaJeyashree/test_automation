name: Mobile + Web + API Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🐍 Python setup
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    # 📦 Install dependencies
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        playwright install
        pip install Appium-Python-Client

    # 🤖 Install Node + Appium
    - name: Install Node & Appium
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    # 📱 Start Android Emulator
    - name: Start Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: default
        arch: x86_64
        profile: Nexus 6
        script: echo "Emulator started"

    # 🚀 Start Appium Server
    - name: Start Appium Server
      run: |
        appium &

    # ⏳ Wait for Appium
    - name: Wait for Appium
      run: |
        sleep 20

    # 🧪 Run Tests
    - name: Run Tests
      run: pytest --alluredir=allure-results
      continue-on-error: true

    # 📊 Install Allure
    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
        tar -zxvf allure-2.29.0.tgz
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # 📈 Generate Report
    - name: Generate Allure Report
      run: allure generate allure-results --clean -o allure-report

    # 📤 Upload Report
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
