name: Automation (API + Web + Mobile)

on:
  push:

jobs:

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run API Tests
        run: pytest tests/api --alluredir=allure-results-api


  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install --with-deps

      - name: Run Web Tests
        run: pytest tests/web --alluredir=allure-results-web


  mobile-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ Install dependencies + Appium + driver
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g appium@2.19.0
          appium driver install uiautomator2

      # ✅ Download APK
      - name: Download APK
        run: |
          curl -L -o app.apk https://github.com/DivyaJeyashree/test_automation/releases/download/v1/app.apk

      # ✅ Verify APK
      - name: Verify APK
        run: ls -lh app.apk

      # ✅ Emulator + Tests
      - name: Run Emulator & Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          profile: Nexus 6

          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -gpu off
            -accel off
            -no-snapshot
            -wipe-data

          disable-animations: true

          script: |
            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Waiting for FULL boot..."
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 5; done;'

            echo "Unlock screen..."
            adb shell input keyevent 82

            echo "Install APK..."
            adb install -r app.apk

            echo "Start Appium..."
            appium > appium.log 2>&1 &
            sleep 30

            echo "Run tests..."
            pytest tests/mobile --alluredir=allure-results-mobile
