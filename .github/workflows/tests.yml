name: Automation (API + Web + Mobile)

on: [push]

jobs:

  # ================= API =================
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run API Tests
        run: pytest tests/api --alluredir=allure-results-api


  # ================= WEB =================
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install --with-deps

      - name: Run Web Tests
        run: pytest tests/web --alluredir=allure-results-web


  # ================= MOBILE =================
    mobile-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Emulator & Mobile Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel

          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
            -accel off
            -no-snapshot
            -wipe-data

          script: |
            echo "📱 Waiting for emulator..."
            adb wait-for-device

            echo "⏳ Giving extra time to boot..."
            sleep 60

            echo "📲 Installing APK..."
            adb install -r app.apk || true

            echo "🚀 Starting Appium..."
            appium > appium.log 2>&1 &

            echo "⏳ Waiting for Appium..."
            sleep 20

            echo "🧪 Running tests..."
            pytest tests/mobile --alluredir=allure-results-mobile
