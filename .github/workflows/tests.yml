name: Run Automation Tests (API + Web + Mobile)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🐍 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    # ✅ FIX: Install Playwright Browsers
    - name: Install Playwright Browsers
      run: |
        pip install playwright
        playwright install --with-deps

    # ☕ Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 📱 Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 📱 Set Android Paths
    - name: Set Android Paths
      run: |
        echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV
        mkdir -p $HOME/.android/avd

    # 📱 Install Emulator
    - name: Install Emulator Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "emulator" "system-images;android-30;google_apis;x86_64"

    # 📱 Create AVD
    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
          -n test \
          -k "system-images;android-30;google_apis;x86_64" \
          --device "pixel" \
          --force

    # 🔍 Verify AVD
    - name: Verify AVD
      run: |
        emulator -list-avds
        ls -R $HOME/.android

    # 📱 Start Emulator (NO KVM FIX)
    - name: Start Emulator
      run: |
        nohup emulator -avd test \
          -no-window \
          -no-audio \
          -no-boot-anim \
          -gpu swiftshader_indirect \
          -accel off \
          -no-snapshot \
          -no-metrics &

        adb wait-for-device

        echo "Waiting for emulator boot..."
        adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 5; done'

        adb shell input keyevent 82

    # 📱 Install Appium
    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    # 📱 Start Appium
    - name: Start Appium Server
      run: |
        appium &
        sleep 20

    # 🧪 Run API Tests
    - name: Run API Tests
      run: pytest tests/api --alluredir=allure-results

    # 🌐 Run Web Tests
    - name: Run Web Tests
      run: pytest tests/web --alluredir=allure-results

    # 📱 Run Mobile Tests
    - name: Run Mobile Tests
      run: pytest tests/mobile --alluredir=allure-results

    # 📊 Upload Report
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
