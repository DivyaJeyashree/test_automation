name: Run Automation Tests (API + Web + Mobile)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🐍 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest allure-pytest

    # 🌐 Install Playwright
    - name: Install Playwright Browsers
      run: |
        pip install playwright
        playwright install --with-deps

    # ☕ Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 📱 Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 📱 Install SDK + Emulator
    - name: Install Emulator Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "emulator" \
        "system-images;android-33;google_apis_playstore;x86_64"

    # 📱 Create AVD
    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
        -n test \
        -k "system-images;android-33;google_apis_playstore;x86_64" \
        --device "pixel" --force

    # 📱 Start Emulator
    - name: Start Emulator
      run: |
        nohup emulator -avd test \
          -no-window \
          -no-audio \
          -gpu swiftshader_indirect \
          -no-snapshot \
          -no-boot-anim &

        adb wait-for-device

        echo "Waiting for full boot..."
        adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 5; done'

        echo "Device booted ✅"

        adb root || true
        adb shell settings put global window_animation_scale 0
        adb shell settings put global transition_animation_scale 0
        adb shell settings put global animator_duration_scale 0

    # 📱 Install Node + Appium
    - name: Install Appium
      run: |
        sudo apt-get update
        sudo apt-get install -y nodejs npm
        npm install -g appium
        appium driver install uiautomator2

    # 📱 Start Appium Server
    - name: Start Appium Server
      run: |
        nohup appium --log-level debug > appium.log 2>&1 &
        sleep 30

    # 🧪 Run API Tests
    - name: Run API Tests
      run: pytest tests/api --alluredir=allure-results

    # 🌐 Run Web Tests
    - name: Run Web Tests
      run: pytest tests/web --alluredir=allure-results

    # 📱 Run Mobile Tests
    - name: Run Mobile Tests
      run: pytest tests/mobile --alluredir=allure-results

    # 📊 Upload Allure Results
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
