name: Run Automation Tests (API + Web + Mobile)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🐍 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    # 🌐 Install Playwright
    - name: Install Playwright
      run: |
        pip install playwright
        playwright install --with-deps

    # ☕ Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 📱 Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ✅ FIX 1: Export correct SDK paths
    - name: Set Android Environment Variables
      run: |
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

    # 📦 Install Required Packages
    - name: Install SDK Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager \
          "platform-tools" \
          "emulator" \
          "platforms;android-30" \
          "system-images;android-30;google_apis;x86_64"

    # 📱 Create Emulator
    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
          -n test \
          -k "system-images;android-30;google_apis;x86_64" \
          --device "pixel"

    # 🚀 Start Emulator (FIXED)
    - name: Start Emulator
      run: |
        $ANDROID_SDK_ROOT/emulator/emulator -avd test \
          -no-window \
          -no-audio \
          -no-boot-anim \
          -gpu swiftshader_indirect \
          -accel off \
          -no-snapshot \
          -no-metrics &

        adb wait-for-device

        echo "Waiting for full boot..."
        adb shell 'while [[ "$(getprop sys.boot_completed)" != "1" ]]; do sleep 5; done'

        adb shell input keyevent 82

    # 📱 Install Node + Appium
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    # 🚀 Start Appium
    - name: Start Appium Server
      run: |
        appium &
        sleep 20

    # 🧪 Run API Tests
    - name: Run API Tests
      run: pytest tests/api --alluredir=allure-results

    # 🌐 Run Web Tests
    - name: Run Web Tests
      run: pytest tests/web --alluredir=allure-results

    # 📱 Run Mobile Tests
    - name: Run Mobile Tests
      run: pytest tests/mobile --alluredir=allure-results

    # 📊 Upload Report
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
