name: Automation (API + Web + Mobile)

on: [push]

jobs:

  # ================= API TESTING =================
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run API Tests
        run: pytest tests/api --alluredir=allure-results-api


  # ================= WEB TESTING =================
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Browsers (Playwright)
        run: playwright install --with-deps

      - name: Run Web Tests
        run: pytest tests/web --alluredir=allure-results-web


  # ================= MOBILE TESTING =================
  mobile-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Java needed for Android
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Python for pytest
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install Android SDK (FIXED)
      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d temp

          mkdir -p latest
          mv temp/* latest/
          rm -rf temp

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH

          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "emulator" "platforms;android-30" "system-images;android-30;google_apis;x86_64"

      # Create Emulator
      - name: Create Emulator
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH

          echo "no" | avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64"

      # Start Emulator
      - name: Start Emulator
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH

          emulator -avd test -no-window -no-audio -no-boot-anim -accel off &

          adb wait-for-device

          until adb shell getprop sys.boot_completed | grep -m 1 '1'; do
            echo "Waiting for emulator..."
            sleep 5
          done

          adb devices

      # Install Node (needed for Appium)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install Appium
      - name: Install Appium
        run: npm install -g appium

      # Start Appium
      - name: Start Appium
        run: appium &

      # Install Python deps
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Run Mobile Tests
      - name: Run Mobile Tests
        run: pytest tests/mobile --alluredir=allure-results-mobile
